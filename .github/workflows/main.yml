name: Build & Release

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $json = Get-Content "updateIndex.json" -Raw | ConvertFrom-Json
          $ver = $json.latestNexaVersion
          Write-Output "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Output "tag=v$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Detected version: $ver"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
          pip install nuitka

      - name: Build with Nuitka
        shell: pwsh
        run: |
          $nameMap = @{
            "discord.py"         = "discord"
            "PyYAML"             = "yaml"
            "pycryptodome"       = "Crypto"
            "audioop-lts"        = "audioop"
            "charset-normalizer" = "charset_normalizer"
          }
          $skip = @("Nuitka", "nuitka")
          $exeName = "nexa-${{ steps.version.outputs.version }}.exe"

          $pkgs = @()
          if (Test-Path "requirements.txt") {
            $pkgs = Get-Content "requirements.txt" |
              Where-Object { $_ -match '\S' -and $_ -notmatch '^\s*#' } |
              ForEach-Object { ($_ -split '[>=<!;]')[0].Trim() } |
              Where-Object { $_ -notin $skip } |
              ForEach-Object { if ($nameMap.ContainsKey($_)) { $nameMap[$_] } else { $_ } }
          }

          $validPkgs = $pkgs | Where-Object {
            $result = python -c "import $_" 2>$null
            $LASTEXITCODE -eq 0
          }

          $includeArgs = ($validPkgs | ForEach-Object { "--include-package=$_" }) -join " "
          $cmd = "python -m nuitka --onefile --output-filename=$exeName --output-dir=dist --assume-yes-for-downloads $includeArgs src/main.py"
          Write-Host "Running: $cmd"
          Invoke-Expression $cmd

      - name: Verify build output
        shell: pwsh
        run: |
          $exeName = "nexa-${{ steps.version.outputs.version }}.exe"
          $exe = "dist\$exeName"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed – $exe not found."
            exit 1
          }
          Write-Host "Build successful: $exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexa-${{ steps.version.outputs.version }}-windows
          path: dist/nexa-${{ steps.version.outputs.version }}.exe
          retention-days: 30

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: .github/RELEASE_NOTES.md
          draft: false
          prerelease: true
          files: dist/nexa-${{ steps.version.outputs.version }}.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          